spring:
  application:
    name: datasetapi
  main:
    banner-mode: off
  data:
    jdbc:
      dialect: mysql
  datasource:
    url: jdbc:mysql://mysql-expenses-1982-expenses-1982.l.aivencloud.com:15490/songs-dataset
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

spotify:
  client-id: ${SPOTIFY_CLIENT_ID:}
  client-secret: ${SPOTIFY_CLIENT_SECRET:}
  token-refresh-skew-seconds: ${SPOTIFY_TOKEN_REFRESH_SKEW_SECONDS:30}

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.namedparam.NamedParameterJdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE

