<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<main th:fragment="artistMain" class="pl-72 pr-8 pb-12 pt-8">
    <section class="mb-10 flex justify-between items-end">
        <div>
            <p class="text-primary font-label text-[11px] uppercase tracking-widest mb-2">Registry &amp; database</p>
            <h2 class="text-4xl font-extrabold tracking-tight font-headline text-on-surface">Artists Ecosystem</h2>
        </div>
        <div class="flex gap-3">
            <button class="px-6 py-2.5 rounded-full bg-surface-container-high text-secondary text-sm font-semibold hover:bg-surface-bright transition-all border border-outline-variant/10">
                Sort by Name
            </button>
            <button class="px-6 py-2.5 rounded-full bg-surface-container-high text-secondary text-sm font-semibold hover:bg-surface-bright transition-all border border-outline-variant/10">
                Filter by Genre
            </button>
        </div>
    </section>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div th:if="${#lists.isEmpty(artistViews)}" class="col-span-full rounded-xl border border-outline-variant/10 bg-surface-container-low p-8 text-center text-on-surface-variant">
            No artists found.
        </div>

        <div th:each="artistView : ${artistViews}" class="group relative bg-surface-container-low rounded-xl overflow-hidden hover:scale-[1.02] transition-all duration-300">
            <div class="group relative bg-surface-container-low rounded-xl overflow-hidden hover:scale-[1.02] transition-all duration-300">
                <div class="aspect-[4/5] relative">
                    <img class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500"
                         th:alt="${artistView.artistName}"
                         th:src="${artistView.artistImageUrl != null ? artistView.artistImageUrl : 'https://via.placeholder.com/600x750?text=Artist'}"
                         src="https://via.placeholder.com/600x750?text=Artist"/>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent"></div>
                    <div class="absolute bottom-0 p-6 w-full"><div class="bg-black/60 backdrop-blur-md p-4 rounded-xl border border-white/10">
                        <h3 class="text-xl font-bold font-headline text-white leading-tight" th:text="${artistView.artistName}">Artist Name</h3>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="material-symbols-outlined text-primary text-[16px]" data-icon="library_music">library_music</span>
                            <span class="text-gray-300 text-xs font-medium uppercase tracking-wider" th:text="${artistView.totalPlays + ' total plays'}">42 total plays</span>
                        </div>
                    </div></div>
                </div>
                <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button class="w-10 h-10 rounded-full primary-gradient flex items-center justify-center text-on-primary-container shadow-lg">
                        <span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-16 flex flex-col items-center">
        <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent mb-12"></div>
        <button class="px-10 py-4 rounded-full bg-surface-container-highest text-primary font-bold tracking-tight hover:bg-surface-bright transition-all scale-100 active:scale-95 flex items-center gap-3">
            <span class="material-symbols-outlined">expand_more</span>
            Explore More Artists
        </button>
        <p class="text-on-surface-variant text-xs font-label uppercase tracking-widest mt-6"
           th:text="${'Showing ' + #lists.size(artistViews) + ' of ' + totalArtists + ' artists registered'}">Showing 8 of 142 artists registered</p>
    </div>
</main>
</html>
